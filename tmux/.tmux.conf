###############################################################################
# Settings
###############################################################################

# set length so session name shoes in full
set-option -g status-left-length 100
set-option -g status-right-length 100


###############################################################################
# Colors
###############################################################################

# pane border styling
set-option -g pane-active-border-style fg="${statusline_light_purple}"
set-option -g pane-border-style fg="${statusline_gray}"

# Status
set-option -g status-left "#[bg=${statusline_green},fg=${statusline_dark_gray}]#{?client_prefix,#[bg=${statusline_yellow}],} #S #[fg=${statusline_green},bg=${statusline_gray}]#{?client_prefix,#[fg=${statusline_yellow}],}${statusline_left_separator}"
set-option -g status-right "#[fg=${statusline_dark_purple},bg=${statusline_gray}]${statusline_right_separator}#[fg=${statusline_white},bg=${statusline_dark_purple},nobold,nounderscore,noitalics] #H #[fg=${statusline_gray},bg=${statusline_dark_purple}]${statusline_right_separator}#[fg=${statusline_dark_purple},bg=${statusline_gray}]${statusline_right_separator}#[fg=${statusline_white},bg=${statusline_dark_purple},nobold,nounderscore,noitalics] %H:%M %d-%b-%y"

# message styling
set -g message-style "bg=${statusline_gray} fg=${statusline_white}"

# default statusbar colors
set -g status-style "bg=${statusline_gray} fg=${statusline_white}"

# Window option
set-window-option -g window-status-current-format "#[fg=${statusline_gray},bg=${statusline_dark_purple}]${statusline_left_separator}#[fg=${statusline_white},bg=${statusline_dark_purple}] #I #W #[fg=${statusline_dark_purple},bg=${statusline_gray}]${statusline_left_separator}"

set-window-option -g window-status-format "#[fg=${statusline_white}]#[bg=${statusline_gray}] #I #W "
set-window-option -g window-status-activity-style "bold"
set-window-option -g window-status-bell-style "bold"
