# }
# if-shell -b '[ "$TERMINAL" = "wezterm" ]' {
#     set-option -sa terminal-features ',xterm-256color:RGB'
# }

# enable yazi's image preview
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

###############################################################################
# Keybindings
###############################################################################

# Syntax:
#   bind
#   -N "Description message" -- add a description
#   -r (optional) -- repeat the key without needing to press prefix again
#   <key>
#   <tmux-command>

# vim-like pane switching
bind -N "Move to last window" -r ^ last-window
bind -N "Move to the pane above" -r k select-pane -U
bind -N "Move to the pane below" -r j select-pane -D
bind -N "Move to the pane on the left" -r h select-pane -L
bind -N "Move to the pane on the right" -r l select-pane -R

# easier split creation
# vertical
unbind %
bind -N "Create a vertical split" | split-window -h -c "#{pane_current_path}"

# horizontal
unbind '"'
bind -N "Create a horizontal split" - split-window -v -c "#{pane_current_path}"

# Reload tmux config on prefix + r
unbind r
bind -N "Reload tmux config file" r source-file ~/.tmux.conf \; display "Config reloaded!"
# TODO: Since tmux 3.2, ~/.config/tmux/tmux.conf is the XDG-compliant location

# Swap current windows with first one with prefix + S
unbind S
bind -N "Swap current window with the one with index 1" S swap-window -t 1

# Copy Mode (Visual mode from vim):
# INFO:
# To enter use prefix + [
# To quit use C-c or Return
# Use vim movement
# Shift-v works, but v doesn't -- use Space instead
# Use Return to yank highlighted text and return to normal mode
# Use prefix + ] to paste

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + v (for visual mode) (in addition to prefix + [)
bind -N "Enter copy mode" v copy-mode

# Use v (in addition to Space) to start selection when using mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection

# Use y (in addition to Return) to copy selection and exit copy mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

